<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatLol</title>
  <script>
    // Anti-flash: terapkan tema tersimpan sebelum CSS dimuat
    (function () {
      if (localStorage.getItem('chatlol-theme') === 'white') {
        document.documentElement.setAttribute('data-theme', 'white');
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- Username Modal -->
<div id="username-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <form id="username-form" autocomplete="off">
    <h2 id="modal-title">Selamat datang di ChatLol</h2>
    <p>Masukkan username untuk memulai. Riwayat chat kamu akan tersimpan.</p>
    <label for="username-input" style="font-size:13px;font-weight:500;">Username</label>
    <input id="username-input" type="text" placeholder="contoh: dania" minlength="2" maxlength="30" required />
    <button id="username-submit" type="submit">Mulai Chat</button>
  </form>
</div>

<!-- Sidebar -->
<aside id="sidebar" aria-label="Riwayat chat">
  <div id="sidebar-logo">ChatLol</div>
  <button id="btn-new-chat" aria-label="Buat chat baru">
    <!-- Lucide Plus icon -->
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Chat Baru
  </button>
  <div id="history-list" role="list" aria-label="Daftar percakapan"></div>
  <div id="sidebar-footer">
    <a href="/files" id="btn-files" aria-label="File Manager" title="File Manager">
      <!-- Lucide FolderOpen icon -->
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 14l1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/></svg>
      File Manager
    </a>
    <a href="/settings" id="btn-settings" aria-label="Pengaturan" title="Pengaturan">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Pengaturan
    </a>
  </div>
</aside>

<!-- Main -->
<main id="main" role="main">

  <!-- Header -->
  <header id="chat-header">
    <div class="select-wrapper">
      <select id="provider-select" aria-label="Pilih provider AI">
        <option value="">Memuat provider...</option>
      </select>
    </div>
    <div class="select-wrapper">
      <select id="model-select" aria-label="Pilih model">
        <option value="">Pilih model</option>
      </select>
    </div>
    <button id="theme-toggle" type="button" style="margin-left:auto" aria-label="Beralih tema">
      <!-- Carbon: Asleep (moon) — terlihat saat tema dark -->
      <svg class="icon-theme-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <!-- Carbon: Light (sun) — terlihat saat tema light -->
      <svg class="icon-theme-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <span id="username-display" aria-label="Username aktif"></span>
  </header>

  <!-- Messages -->
  <div id="messages" role="log" aria-live="polite" aria-label="Percakapan"></div>

  <!-- Empty state (shown when no messages) -->
  <div id="empty-state" aria-hidden="true">
    <!-- Sparkle icon -->
    <svg width="44" height="44" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 2.5l1.9 5.6a4 4 0 0 0 2.5 2.5l5.6 1.9-5.6 1.9a4 4 0 0 0-2.5 2.5L12 22.5l-1.9-5.6a4 4 0 0 0-2.5-2.5L2 12.5l5.6-1.9a4 4 0 0 0 2.5-2.5L12 2.5z"/>
    </svg>
    <h2>Ada yang bisa kubantu?</h2>
    <p>Pilih provider &amp; model di atas, lalu mulai mengetik di bawah.</p>
  </div>

  <!-- Input area -->
  <section id="input-area" aria-label="Input pesan">

    <!-- File preview bar -->
    <div id="file-preview" role="status">
      <!-- Lucide File icon -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
      </svg>
      <span id="file-preview-name"></span>
      <button id="file-preview-remove" type="button" aria-label="Hapus file yang dilampirkan">
        <!-- Lucide X icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div id="input-row">
      <!-- Upload button with Lucide Paperclip icon -->
      <button id="upload-btn" type="button" aria-label="Lampirkan file">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>

      <!-- Hidden file input -->
      <input
        type="file"
        id="file-input"
        style="display:none"
        accept=".txt,.md,.py,.js,.ts,.jsx,.tsx,.html,.css,.json,.yaml,.yml,.toml,.sh,.go,.rs,.java,.c,.cpp,.pdf,.png,.jpg,.jpeg,.webp"
        aria-hidden="true"
        tabindex="-1"
      />

      <!-- Message textarea -->
      <textarea
        id="message-input"
        placeholder="Tanyakan apa saja..."
        rows="1"
        aria-label="Pesan"
        aria-multiline="true"
      ></textarea>

      <!-- Send button with Lucide Send icon -->
      <button id="send-btn" type="button" aria-label="Kirim pesan" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </section>

</main>

<script src="/static/app.js"></script>
</body>
</html>
