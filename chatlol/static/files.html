<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatLol Files</title>
  <script>
    (function () {
      if (localStorage.getItem('chatlol-theme') === 'white') {
        document.documentElement.setAttribute('data-theme', 'white');
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/files.css" />
</head>
<body>
  <header id="header">
    <span class="logo">ChatLol Files</span>
    <div class="header-actions">
      <button id="theme-toggle" type="button" aria-label="Beralih tema">
        <svg class="icon-theme-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-theme-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <a href="/" class="btn-back">&#8592; Kembali ke Chat</a>
    </div>
  </header>

  <div id="toolbar">
    <nav id="breadcrumb" aria-label="Navigasi folder"></nav>
    <div class="view-toggle">
      <button id="btn-grid" class="btn-view active" aria-label="Grid view" title="Grid">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button id="btn-list" class="btn-view" aria-label="List view" title="List">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div id="action-bar">
    <button id="btn-mkdir" class="btn-action">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
      Folder Baru
    </button>
    <button id="btn-upload" class="btn-action">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      Upload File
    </button>
    <input id="file-input" type="file" multiple hidden />
    <input id="search-input" type="search" placeholder="Cari file..." aria-label="Cari file" />
  </div>

  <div id="upload-progress" hidden></div>

  <main id="file-area" class="view-grid" role="region" aria-label="Daftar file">
    <div id="empty-state" hidden>
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <p>Folder ini kosong</p>
    </div>
    <div id="file-grid"></div>
  </main>

  <div id="drop-overlay" hidden>
    <div class="drop-inner">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      <p>Lepas file untuk upload</p>
    </div>
  </div>

  <div id="mkdir-modal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <h2 id="modal-title">Buat Folder Baru</h2>
      <input id="mkdir-input" type="text" placeholder="Nama folder..." autocomplete="off" />
      <div class="modal-actions">
        <button id="mkdir-cancel" class="btn-secondary">Batal</button>
        <button id="mkdir-confirm" class="btn-primary">Buat</button>
      </div>
    </div>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <script src="/static/files.js"></script>
</body>
</html>
